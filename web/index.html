<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALM-1 Adaptive Language Model</title>
    <style>
        :root { --primary: #3498db; --bg: #0f172a; --text: #f8fafc; --panel: #1e293b; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: #020617; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        .main { flex: 1; display: flex; flex-direction: column; padding: 2rem; position: relative; }
        .chat-container { flex: 1; overflow-y: auto; background: var(--panel); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #334155; }
        .input-area { display: flex; gap: 0.75rem; }
        input { flex: 1; background: #0f172a; border: 1px solid #334155; color: white; padding: 0.75rem 1rem; border-radius: 8px; outline: none; }
        input:focus { border-color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .msg { margin-bottom: 1rem; padding: 0.75rem; border-radius: 8px; }
        .user-msg { background: #334155; align-self: flex-end; }
        .alm-msg { background: #1e293b; border-left: 4px solid var(--primary); }
        .badge { font-size: 0.7rem; text-transform: uppercase; background: var(--primary); padding: 2px 6px; border-radius: 4px; margin-bottom: 0.5rem; display: inline-block; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>ALM-1</h2>
        <label>Mode</label>
        <select id="mode" style="width:100%; padding:0.5rem; background:#0f172a; color:white;">
            <option value="chat">Chat</option>
            <option value="search">Search Agent (RAG)</option>
        </select>
        <div style="font-size:0.8rem; margin-top:1rem;">Neural Engine: Active</div>
    </div>
    <div class="main">
        <div class="chat-container" id="chat">
            <div class="msg alm-msg"><span class="badge">SYSTEM</span><br>ALM-1 Neural Core Ready. I learn from every interaction.</div>
        </div>
        <div class="input-area">
            <input type="text" id="prompt" placeholder="Ask ALM-1...">
            <button onclick="send()">Send</button>
        </div>
    </div>
    <script>
        async function send() {
            const prompt = document.getElementById("prompt").value;
            const mode = document.getElementById("mode").value;
            if (!prompt) return;

            const chat = document.getElementById("chat");
            chat.innerHTML += `<div class="msg user-msg">You: ${prompt}</div>`;

            // Call local API (Only works when running via app.py)
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({prompt, mode})
                });
                const data = await res.json();
                chat.innerHTML += `<div class="msg alm-msg"><span class="badge">${mode.upper()}</span><br>ALM: ${data.response}</div>`;
            } catch (e) {
                // Fallback for static (GitHub Pages) mode
                chat.innerHTML += `<div class="msg alm-msg"><span class="badge">STATIC</span><br>ALM: [Running in Static Mode. Neural API only available when cloned locally.]</div>`;
            }
            document.getElementById("prompt").value = "";
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
