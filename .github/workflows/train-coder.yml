name: Train ALM-1-Coder

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: "Number of training epochs"
        required: true
        default: "100"

permissions:
  contents: write
  actions: write

jobs:
  train:
    name: Train ALM-1-Coder
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install torch numpy --index-url https://download.pytorch.org/whl/cpu
          pip install tiktoken

      - name: Train model
        run: cd ALM-1-Coder && python train.py --epochs ${{ github.event.inputs.epochs }} --no-gentest

      - name: Generation test
        run: cd ALM-1-Coder && python train.py --epochs 0 --resume

      - name: Upload checkpoint artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-checkpoint
          path: ALM-1-Coder/checkpoints/

      - name: Upload numpy weights artifact
        uses: actions/upload-artifact@v4
        with:
          name: numpy-weights
          path: ALM-1-Coder/checkpoints/numpy_weights/

      - name: Commit trained weights
        run: |
          git config user.name "ALM Trainer"
          git config user.email "alm-trainer@bot.com"
          git add ALM-1-Coder/checkpoints/numpy_weights/
          git diff --staged --quiet || git commit -m "auto: update model weights after training [skip ci]"
          git push
