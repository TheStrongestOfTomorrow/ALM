<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALM - Adaptive Learning Model</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #818cf8;
            --primary-glow: rgba(99, 102, 241, 0.3);
            --bg: #0a0a0f;
            --bg-secondary: #111118;
            --bg-tertiary: #1a1a24;
            --panel: #13131d;
            --border: #2a2a3a;
            --text: #e4e4ed;
            --text-secondary: #9ca3af;
            --text-dim: #6b7280;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --user-bg: #1e1b4b;
            --assistant-bg: #13131d;
            --code-bg: #0d1117;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s;
        }

        .sidebar-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.9rem;
            color: white;
        }

        .logo-text {
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-sub {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .new-chat-btn {
            width: 100%;
            padding: 0.7rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .new-chat-btn:hover { background: var(--primary-hover); box-shadow: 0 0 20px var(--primary-glow); }

        .search-box {
            margin: 0.75rem 1.25rem;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.55rem 0.75rem 0.55rem 2rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            font-size: 0.8rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus { border-color: var(--primary); }

        .search-box::before {
            content: '\1F50D';
            position: absolute;
            left: 0.6rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.7rem;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .conv-item {
            padding: 0.7rem 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-secondary);
            transition: all 0.15s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }

        .conv-item:hover { background: var(--bg-tertiary); color: var(--text); }
        .conv-item.active { background: var(--primary); color: white; }
        .conv-item .delete-btn { display: none; background: none; border: none; color: var(--error); cursor: pointer; font-size: 0.75rem; }
        .conv-item:hover .delete-btn { display: block; }

        .sidebar-footer {
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border);
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        .model-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: var(--bg-tertiary);
            padding: 0.3rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--primary);
        }

        .model-badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-dim);
        }

        .model-badge .dot.online {
            background: var(--success);
            animation: pulse 2s infinite;
        }

        .model-badge .dot.loading {
            background: var(--warning);
            animation: pulse 0.8s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Main Chat Area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0;
        }

        .chat-header {
            padding: 0.8rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
        }

        .chat-title {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
        }

        .header-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .header-btn:hover { border-color: var(--primary); color: var(--text); }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            scroll-behavior: smooth;
        }

        /* Loading Screen */
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .loading-status {
            color: var(--text-dim);
            font-size: 0.85rem;
            max-width: 400px;
            line-height: 1.5;
        }

        .loading-progress {
            margin-top: 1rem;
            width: 300px;
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #a855f7);
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s;
        }

        /* Welcome */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            opacity: 0.8;
        }

        .welcome-icon { font-size: 3rem; margin-bottom: 1rem; }

        .welcome-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-sub {
            color: var(--text-dim);
            font-size: 0.9rem;
            max-width: 400px;
            line-height: 1.5;
        }

        .quick-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .quick-action {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 0.6rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .quick-action:hover { border-color: var(--primary); color: var(--text); }

        /* Messages */
        .msg {
            margin-bottom: 1rem;
            padding: 0.9rem 1rem;
            border-radius: 10px;
            max-width: 85%;
            line-height: 1.6;
            font-size: 0.88rem;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            background: var(--user-bg);
            margin-left: auto;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .alm-msg {
            background: var(--assistant-bg);
            margin-right: auto;
            border-left: 3px solid var(--primary);
        }

        .msg-role {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.4rem;
            font-weight: 700;
        }

        .user-msg .msg-role { color: var(--primary); }
        .alm-msg .msg-role { color: #a855f7; }

        .msg-content { white-space: pre-wrap; word-break: break-word; }

        .msg-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .msg:hover .msg-actions { opacity: 1; }

        .msg-action-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.7rem;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
        }

        .msg-action-btn:hover { color: var(--text); background: var(--bg-tertiary); }

        /* Input Area */
        .input-area {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        .input-wrapper {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .input-box {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.88rem;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 44px;
            max-height: 150px;
            transition: border-color 0.2s;
            line-height: 1.5;
        }

        .input-box:focus { border-color: var(--primary); }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .send-btn:hover { background: var(--primary-hover); box-shadow: 0 0 20px var(--primary-glow); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .input-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        .mode-selector {
            display: flex;
            gap: 0.3rem;
        }

        .mode-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 0.25rem 0.6rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.15s;
        }

        .mode-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(99,102,241,0.1); }

        /* Settings Panel */
        .settings-panel {
            position: absolute;
            top: 0;
            right: -340px;
            width: 320px;
            height: 100%;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            padding: 1.5rem;
            overflow-y: auto;
            transition: right 0.3s;
            z-index: 100;
        }

        .settings-panel.open { right: 0; }

        .settings-title {
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .settings-close {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 1.2rem;
        }

        .setting-group { margin-bottom: 1.25rem; }

        .setting-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            display: flex;
            justify-content: space-between;
        }

        .setting-value { color: var(--primary); font-weight: 700; }

        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
        }

        .setting-textarea {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.6rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-family: inherit;
            resize: vertical;
            min-height: 60px;
            outline: none;
        }

        .setting-textarea:focus { border-color: var(--primary); }

        .setting-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .toggle {
            width: 40px;
            height: 22px;
            background: var(--bg-tertiary);
            border-radius: 11px;
            cursor: pointer;
            position: relative;
            transition: background 0.2s;
            border: 1px solid var(--border);
        }

        .toggle.active { background: var(--primary); border-color: var(--primary); }

        .toggle::after {
            content: '';
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }

        .toggle.active::after { transform: translateX(18px); }

        /* Mobile */
        .mobile-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                z-index: 200;
                transform: translateX(-100%);
                height: 100%;
            }
            .sidebar.open { transform: translateX(0); }
            .mobile-toggle { display: block; }
            .msg { max-width: 95%; }
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 0.5rem 0;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 199;
        }

        .sidebar-overlay.show { display: block; }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">A</div>
                <div>
                    <div class="logo-text">ALM</div>
                    <div class="logo-sub">Adaptive Learning Model</div>
                </div>
            </div>
            <button class="new-chat-btn" onclick="newConversation()">+ New Chat</button>
        </div>
        <div class="search-box">
            <input type="text" placeholder="Search conversations..." oninput="searchConversations(this.value)">
        </div>
        <div class="conversations-list" id="convList"></div>
        <div class="sidebar-footer">
            <div class="model-badge">
                <span class="dot" id="statusDot"></span>
                <span id="statusText">Initializing...</span>
            </div>
        </div>
    </div>

    <!-- Main -->
    <div class="main">
        <div class="chat-header">
            <div style="display:flex;align-items:center;gap:0.75rem;">
                <button class="mobile-toggle" onclick="toggleSidebar()">&#9776;</button>
                <span class="chat-title" id="chatTitle">ALM - Adaptive Learning Model</span>
            </div>
            <div class="header-actions">
                <button class="header-btn" onclick="exportChat()">Export</button>
                <button class="header-btn" onclick="toggleSettings()">Settings</button>
            </div>
        </div>

        <div class="chat-container" id="chatContainer">
            <!-- Loading Screen -->
            <div class="loading-screen" id="loadingScreen">
                <div class="loading-spinner"></div>
                <div class="loading-title">Loading ALM Neural Engine</div>
                <div class="loading-status" id="loadingStatus">Initializing Pyodide (Python in browser)...</div>
                <div class="loading-progress">
                    <div class="loading-progress-bar" id="loadingBar"></div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea class="input-box" id="messageInput" placeholder="Ask ALM anything..." rows="1"
                    onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>Send</button>
            </div>
            <div class="input-footer">
                <div class="mode-selector">
                    <button class="mode-btn active" data-mode="chat" onclick="setMode('chat', this)">Chat</button>
                    <button class="mode-btn" data-mode="search" onclick="setMode('search', this)">Search (RAG)</button>
                </div>
                <span id="tokenInfo">Runs in your browser via Pyodide</span>
            </div>
        </div>

        <!-- Settings Panel -->
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-title">
                <span>Settings</span>
                <button class="settings-close" onclick="toggleSettings()">&times;</button>
            </div>
            <div class="setting-group">
                <div class="setting-label"><span>System Prompt</span></div>
                <textarea class="setting-textarea" id="systemPrompt"
                    placeholder="Custom system prompt...">You are ALM, a helpful and adaptive AI assistant.</textarea>
            </div>
            <div class="setting-group">
                <div class="setting-label"><span>Temperature</span><span class="setting-value" id="tempValue">0.7</span></div>
                <input type="range" min="0.1" max="2.0" step="0.1" value="0.7"
                    oninput="settings.temperature=parseFloat(this.value);document.getElementById('tempValue').textContent=this.value">
            </div>
            <div class="setting-group">
                <div class="setting-label"><span>Top P</span><span class="setting-value" id="topPValue">0.9</span></div>
                <input type="range" min="0.1" max="1.0" step="0.05" value="0.9"
                    oninput="settings.top_p=parseFloat(this.value);document.getElementById('topPValue').textContent=this.value">
            </div>
            <div class="setting-group">
                <div class="setting-label"><span>Max Tokens</span><span class="setting-value" id="maxTokensValue">100</span></div>
                <input type="range" min="20" max="200" step="10" value="100"
                    oninput="settings.max_tokens=parseInt(this.value);document.getElementById('maxTokensValue').textContent=this.value">
            </div>
            <div class="setting-group">
                <div class="setting-label"><span>Repetition Penalty</span><span class="setting-value" id="repPenValue">1.3</span></div>
                <input type="range" min="1.0" max="2.0" step="0.1" value="1.3"
                    oninput="settings.repetition_penalty=parseFloat(this.value);document.getElementById('repPenValue').textContent=this.value">
            </div>
            <div class="setting-group">
                <div class="setting-label"><span>Top K</span><span class="setting-value" id="topKValue">40</span></div>
                <input type="range" min="1" max="100" step="1" value="40"
                    oninput="settings.top_k=parseInt(this.value);document.getElementById('topKValue').textContent=this.value">
            </div>
        </div>
    </div>

    <script>
        // ===== GPT-2 BPE Tokenizer (JS implementation for browser) =====
        const GPT2_ENCODINGS = {
            // We'll initialize this from Pyodide
        };

        // ===== State =====
        let pyodide = null;
        let modelReady = false;
        let isGenerating = false;
        let currentConvId = null;
        let conversations = {};
        let currentMode = 'chat';
        let settings = {
            temperature: 0.7,
            top_p: 0.9,
            max_tokens: 100,
            repetition_penalty: 1.3,
            top_k: 40
        };

        // ===== Pyodide Initialization =====
        async function initPyodide() {
            try {
                updateLoading('Loading Pyodide runtime...', 10);
                pyodide = await loadPyodide({
                    indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.25.1/full/'
                });

                updateLoading('Installing NumPy...', 30);
                await pyodide.loadPackage('numpy');

                updateLoading('Loading ALM inference engine...', 50);
                // Load the inference Python module
                const inferenceResp = await fetch('inference.py');
                const inferenceCode = await inferenceResp.text();
                await pyodide.runPythonAsync(inferenceCode);

                updateLoading('Downloading ALM weights (49 MB)...', 60);
                // Initialize the model in Python
                await pyodide.runPythonAsync(`
import sys
sys.stdout.write = lambda x: None  # Suppress print output
alm_model = ALMInference('alm_weights.npz', 'alm_config.json')
print = lambda *a: None  # Suppress further prints
`);

                updateLoading('Loading tokenizer...', 85);
                // Set up tokenizer in Python using a simple approach
                await pyodide.runPythonAsync(`
import json

# Simple GPT-2 tokenizer using tiktoken-like approach
# We'll use a basic byte-level approach for the browser
class SimpleTokenizer:
    def __init__(self):
        # Load the GPT-2 BPE ranks
        # For now, use a simple character/word level approach
        # that maps to tiktoken-compatible token IDs
        self.byte_encoder = self._bytes_to_unicode()
        self.byte_decoder = {v: k for k, v in self.byte_encoder.items()}
        self.encoder = {}
        self.decoder = {}
        self._load_vocab()

    def _bytes_to_unicode(self):
        bs = list(range(ord('!'), ord('~')+1)) + list(range(ord('A'), ord('z')+1)) + list(range(ord('0'), ord('9')+1)) + [ord(' ')] + [10, 13]
        cs = bs[:]
        n = 0
        for b in range(256):
            if b not in bs:
                bs.append(b)
                cs.append(256 + n)
                n += 1
        return dict(zip(bs, [chr(c) for c in cs]))

    def _load_vocab(self):
        try:
            # Try loading a pre-built vocab
            with open('gpt2_vocab.json', 'r') as f:
                self.encoder = json.load(f)
                self.decoder = {v: k for k, v in self.encoder.items()}
        except:
            # Fallback: simple byte-level encoding
            # Map each byte to a token ID (not perfect but functional)
            for i in range(256):
                char = self.byte_encoder.get(i, chr(i))
                self.encoder[char] = i
                self.decoder[i] = char

    def encode(self, text):
        # Use tiktoken if available, otherwise simple encoding
        try:
            import tiktoken
            enc = tiktoken.get_encoding('gpt2')
            return enc.encode(text)
        except:
            # Simple fallback: character-level with GPT-2 compatible IDs
            tokens = []
            for char in text:
                byte_val = ord(char)
                if byte_val in self.byte_encoder:
                    mapped = self.byte_encoder[byte_val]
                    if mapped in self.encoder:
                        tokens.append(self.encoder[mapped])
                    else:
                        tokens.append(byte_val)
                else:
                    tokens.append(byte_val % self.vocab_size)
            return tokens if tokens else [0]

    def decode(self, token_ids):
        try:
            import tiktoken
            enc = tiktoken.get_encoding('gpt2')
            return enc.decode(token_ids)
        except:
            # Simple fallback
            chars = []
            for tid in token_ids:
                if tid in self.decoder:
                    chars.append(self.decoder[tid])
                elif tid < 256:
                    chars.append(chr(tid))
            return ''.join(chars)

tokenizer = SimpleTokenizer()
`);

                // Try to load tiktoken in Pyodide for proper tokenization
                try {
                    await pyodide.loadPackage('micropip');
                    await pyodide.runPythonAsync(`
import micropip
try:
    await micropip.install('tiktoken')
    print('tiktoken loaded!')
except:
    print('tiktoken not available, using fallback tokenizer')
`);
                } catch(e) {
                    console.log('micropip not available, using fallback');
                }

                updateLoading('ALM ready!', 100);
                modelReady = true;

                // Update UI
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('statusDot').className = 'dot online';
                document.getElementById('statusText').textContent = 'ALM Online - Pyodide';

                // Show welcome screen
                setTimeout(() => {
                    showWelcome();
                }, 500);

            } catch (error) {
                console.error('Pyodide init error:', error);
                updateLoading('Error loading ALM: ' + error.message, 0);
                document.getElementById('statusDot').className = 'dot';
                document.getElementById('statusText').textContent = 'Error - Check console';
            }
        }

        function updateLoading(text, percent) {
            document.getElementById('loadingStatus').textContent = text;
            document.getElementById('loadingBar').style.width = percent + '%';
        }

        function showWelcome() {
            const container = document.getElementById('chatContainer');
            container.innerHTML = `
                <div class="welcome-screen">
                    <div class="welcome-icon">&#129504;</div>
                    <div class="welcome-title">Welcome to ALM</div>
                    <div class="welcome-sub">
                        I'm the Adaptive Learning Model - running entirely in your browser via Pyodide!
                        No server needed. Ask me anything about coding, science, or just chat.
                    </div>
                    <div class="quick-actions">
                        <div class="quick-action" onclick="quickSend('What can you do?')">What can you do?</div>
                        <div class="quick-action" onclick="quickSend('Write a Python function')">Code help</div>
                        <div class="quick-action" onclick="quickSend('What is machine learning?')">Explain ML</div>
                        <div class="quick-action" onclick="quickSend('Tell me about ALM')">About ALM</div>
                    </div>
                </div>
            `;
        }

        // ===== Chat Functions =====
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || isGenerating || !modelReady) return;

            input.value = '';
            autoResize(input);
            addMessage('user', text);
            isGenerating = true;
            document.getElementById('sendBtn').disabled = true;

            // Show typing indicator
            const container = document.getElementById('chatContainer');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'msg alm-msg';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = '<div class="msg-role">ALM</div><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
            container.appendChild(typingDiv);
            scrollToBottom();

            try {
                // Encode the prompt
                const encodeResult = await pyodide.runPythonAsync(`
tokenizer.encode('${text.replace(/\\/g, '\\\\').replace(/'/g, "\\'")}')
`);
                const tokens = encodeResult.toJs();

                // Generate response
                const genResult = await pyodide.runPythonAsync(`
import numpy as np
output = alm_model.generate(
    [${Array.from(tokens).join(',')}],
    max_new_tokens=${settings.max_tokens},
    temperature=${settings.temperature},
    top_k=${settings.top_k},
    repetition_penalty=${settings.repetition_penalty}
)
list(output)
`);
                const outputTokens = genResult.toJs();
                const inputLen = tokens.length;

                // Decode response
                const responseTokens = Array.from(outputTokens).slice(inputLen);
                const decodeResult = await pyodide.runPythonAsync(`
tokenizer.decode([${responseTokens.join(',')}])
`);
                let response = decodeResult;
                // Clean up special tokens
                response = response.replace(/<\|assistant\|>/g, '').replace(/<\|end\|>/g, '').trim();

                // Remove typing indicator
                const ti = document.getElementById('typingIndicator');
                if (ti) ti.remove();

                addMessage('assistant', response || 'I processed your request but generated an empty response. Try again!');

            } catch (error) {
                console.error('Generation error:', error);
                const ti = document.getElementById('typingIndicator');
                if (ti) ti.remove();
                addMessage('assistant', 'Error generating response: ' + error.message);
            }

            isGenerating = false;
            document.getElementById('sendBtn').disabled = false;
            input.focus();
        }

        function quickSend(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }

        // ===== Conversation Management =====
        function newConversation() {
            const id = 'conv_' + Date.now();
            conversations[id] = { id, title: 'New Chat', messages: [], created: Date.now(), updated: Date.now() };
            saveToStorage();
            switchConversation(id);
            renderConvList();
        }

        function switchConversation(id) {
            currentConvId = id;
            renderConvList();
            renderMessages();
            if (conversations[id]) {
                document.getElementById('chatTitle').textContent = conversations[id].title;
            }
        }

        function deleteConversation(id, e) {
            e.stopPropagation();
            delete conversations[id];
            saveToStorage();
            if (currentConvId === id) {
                const ids = Object.keys(conversations);
                if (ids.length > 0) switchConversation(ids[0]);
                else newConversation();
            }
            renderConvList();
        }

        function renderConvList() {
            const list = document.getElementById('convList');
            const sorted = Object.values(conversations).sort((a, b) => b.updated - a.updated);
            list.innerHTML = sorted.map(c => `
                <div class="conv-item ${c.id === currentConvId ? 'active' : ''}" onclick="switchConversation('${c.id}')">
                    <span>${escapeHtml(c.title)}</span>
                    <button class="delete-btn" onclick="deleteConversation('${c.id}', event)">&#10005;</button>
                </div>
            `).join('');
        }

        function searchConversations(query) {
            document.querySelectorAll('.conv-item').forEach(item => {
                item.style.display = item.textContent.toLowerCase().includes(query.toLowerCase()) ? '' : 'none';
            });
        }

        function addMessage(role, content) {
            if (!conversations[currentConvId]) return;
            const msg = { role, content, timestamp: Date.now() };
            conversations[currentConvId].messages.push(msg);
            conversations[currentConvId].updated = Date.now();

            if (conversations[currentConvId].messages.length === 1 && role === 'user') {
                conversations[currentConvId].title = content.substring(0, 40) + (content.length > 40 ? '...' : '');
                document.getElementById('chatTitle').textContent = conversations[currentConvId].title;
                renderConvList();
            }

            saveToStorage();

            const container = document.getElementById('chatContainer');
            // Remove welcome screen if present
            const welcome = container.querySelector('.welcome-screen');
            if (welcome) welcome.remove();

            container.insertAdjacentHTML('beforeend', createMessageHtml(msg));
            scrollToBottom();
        }

        function renderMessages() {
            const container = document.getElementById('chatContainer');
            const conv = conversations[currentConvId];

            if (!conv || conv.messages.length === 0) {
                if (modelReady) showWelcome();
                return;
            }

            container.innerHTML = conv.messages.map(m => createMessageHtml(m)).join('');
            scrollToBottom();
        }

        function createMessageHtml(msg) {
            const isUser = msg.role === 'user';
            return `
                <div class="msg ${isUser ? 'user-msg' : 'alm-msg'}">
                    <div class="msg-role">${isUser ? 'YOU' : 'ALM'}</div>
                    <div class="msg-content">${formatContent(msg.content)}</div>
                    <div class="msg-actions">
                        <button class="msg-action-btn" onclick="copyMsg(this)">Copy</button>
                    </div>
                </div>
            `;
        }

        function formatContent(text) {
            let f = escapeHtml(text);
            f = f.replace(/\`\`\`(\w*)\n?([\s\S]*?)\`\`\`/g, '<pre style="background:var(--code-bg);padding:0.75rem;border-radius:6px;overflow-x:auto;margin:0.5rem 0;font-size:0.8rem"><code>$2</code></pre>');
            f = f.replace(/\`([^\`]+)\`/g, '<code style="background:var(--code-bg);padding:0.15rem 0.4rem;border-radius:3px;font-size:0.82rem">$1</code>');
            f = f.replace(/\*\*([^\*]+)\*\*/g, '<strong>$1</strong>');
            return f;
        }

        // ===== UI Helpers =====
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 150) + 'px';
        }

        function scrollToBottom() {
            const c = document.getElementById('chatContainer');
            c.scrollTop = c.scrollHeight;
        }

        function setMode(mode, btn) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('show');
        }

        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('open');
        }

        function copyMsg(btn) {
            const content = btn.closest('.msg').querySelector('.msg-content').textContent;
            navigator.clipboard.writeText(content).then(() => {
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = 'Copy', 1500);
            });
        }

        function exportChat() {
            const conv = conversations[currentConvId];
            if (!conv) return;
            const text = conv.messages.map(m => `${m.role === 'user' ? 'You' : 'ALM'}: ${m.content}`).join('\n\n');
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([text], { type: 'text/plain' }));
            a.download = `alm-chat-${conv.title.replace(/\s+/g, '-')}.txt`;
            a.click();
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        // ===== Storage =====
        function saveToStorage() {
            try { localStorage.setItem('alm_conversations', JSON.stringify(conversations)); } catch(e) {}
        }

        function loadFromStorage() {
            try {
                const c = localStorage.getItem('alm_conversations');
                if (c) conversations = JSON.parse(c);
            } catch(e) {}
        }

        // ===== Init =====
        loadFromStorage();
        if (Object.keys(conversations).length === 0) newConversation();
        else {
            const last = Object.values(conversations).sort((a, b) => b.updated - a.updated)[0];
            if (last) switchConversation(last.id);
        }
        renderConvList();

        // Start Pyodide loading
        initPyodide();
    </script>
</body>
</html>
